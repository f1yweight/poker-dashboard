server:
  port: ${PORT:8080}

spring:

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/poker_dashboard}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  logging:
    level:
      org.flywaydb: DEBUG

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

jwt:
  secret: ${JWT_SECRET:very-long-local-dev-secret-key-for-poker-dashboard-jwt-token-signing-123456}
  expiration-seconds: ${JWT_EXPIRATION_SECONDS:86400}